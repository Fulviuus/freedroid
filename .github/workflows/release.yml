name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Fetch bundled adb sidecar
        run: bash scripts/fetch-adb.sh

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing + notarization (optional) ---
          # To produce a signed, notarized build, uncomment these and add the
          # matching repository secrets (requires a paid Apple Developer account).
          # Leave them commented for an unsigned build — passing an empty
          # APPLE_CERTIFICATE makes the bundler attempt (and fail) a cert import.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target universal-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: "Freedroid ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install Freedroid."
          releaseDraft: true
          prerelease: false

  # Self-contained, MTP-enabled build (Apple Silicon). Connects without USB
  # debugging; libmtp + libusb are bundled into the .app. Attached as an extra
  # asset on the same release.
  release-mtp:
    needs: release
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install libmtp
        run: brew install libmtp

      - name: Fetch bundled adb sidecar
        run: bash scripts/fetch-adb.sh

      - name: Install frontend dependencies
        run: npm ci

      - name: Build self-contained MTP DMG
        run: bash scripts/build-mtp-dmg.sh

      - name: Upload MTP DMG to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist/Freedroid_*_aarch64-mtp.dmg --clobber
