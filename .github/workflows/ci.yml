name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Fetch bundled adb sidecar
        run: bash scripts/fetch-adb.sh

      - run: npm ci

      - name: Type-check frontend
        run: npm run check

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
